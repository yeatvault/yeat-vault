name: Update Yeat Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update tracks from Google Sheets
        run: python scripts/update_from_tracker.py

      - name: Commit updated files
        run: |
          git config user.name "yeat-vault-bot"
          git config user.email "actions@github.com"
          git add tracks.json index.html data/seen_tracker_keys.json
          git commit -m "Update tracks from Yeat Tracker" || echo "No changes to commit"
          git push
